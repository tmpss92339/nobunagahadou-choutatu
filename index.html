      align-items: center;
      overflow-x: auto;
      white-space: nowrap;

      font-size: 9px;
      line-height: 1.1;

      flex: 0 0 auto;

    }

    .card-title {
      font-weight: bold;
      margin-bottom: 4px;
      font-size: 10px;
    }

    /* card-line removed */

    .right-tables {

    .table-box {

      border-radius: 6px;
      overflow: hidden;
      background: #fff;

      font-size: 10px;
      font-weight: bold;
      background: #eef4EE;
      border-bottom: 1px solid #DAE4DA;

      padding: 4px 3px;
      text-align: center;
      font-size: 9px;

      font-weight: bold;

    const stepBonusMap = {
      C: 0,
      B: 70,
      A: 140,
      S: 210
    };

    const blockVariables = new Array(blockData.length).fill(null);
    const blockVariables2 = new Array(blockData.length).fill(null);
    const blockVariables3 = new Array(blockData.length).fill(null);

    function calculateBlockValue(item, starValue) {
      const step = item.values[0];
      const initialPolitics = Number(item.values[3]);
      const maxStarBonus = Number(item.values[4]);
      const stepBonus = stepBonusMap[step] ?? 0;
      return initialPolitics + stepBonus + ((maxStarBonus + 700) * starValue / 7);
    }

    function calculateBlockValueByRide(item, starValue) {
      const ride = item.values[1];
      const initialPolitics = Number(item.values[3]);
      const maxStarBonus = Number(item.values[4]);
      const rideBonus = stepBonusMap[ride] ?? 0;
      return initialPolitics + rideBonus + ((maxStarBonus + 700) * starValue / 7);
    }

    function calculateBlockValueByBow(item, starValue) {
      const bow = item.values[2];
      const initialPolitics = Number(item.values[3]);
      const maxStarBonus = Number(item.values[4]);
      const bowBonus = stepBonusMap[bow] ?? 0;
      return initialPolitics + bowBonus + ((maxStarBonus + 700) * starValue / 7);
    }

          });
        }
      });

      answeredItems.sort((a, b) => b.rawValue - a.rawValue);

      const rowCount = Math.max(answeredItems.length, 1);

    function recalculateAllBlockVariables() {
      blockData.forEach((item, index) => {
        const checked = document.querySelector(`input[name="block-${index + 1}"]:checked`);
        if (!checked) {
          blockVariables[index] = null;
          blockVariables2[index] = null;
          blockVariables3[index] = null;
          return;
        }
        const starValue = Number(checked.value);
        blockVariables[index] = calculateBlockValue(item, starValue);
        blockVariables2[index] = calculateBlockValueByRide(item, starValue);
